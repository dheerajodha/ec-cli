#
# EnterpriseContractPolicy for validating Tekton task bundles
# This policy detects task bundles and validates the task definitions within them
#
# For POC testing: use with --ignore-rekor and certificate-* flags to bypass signature validation
#
description: 'POC policy for validating Tekton task bundle images'
sources:
  - name: Task Bundle Policies
    policy:
      # Reference the task bundle validation policies in this directory (local path for testing)
      - ./policies/task-bundle
    config:
      include:
        - task_bundle_detector
        - task_extractor
        - task_validation
      exclude:
        - builtin.attestation
        - builtin.image
